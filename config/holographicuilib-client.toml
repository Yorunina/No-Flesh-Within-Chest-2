
[theme]
	#config.theme.id.comment
	id = "default"

	[theme.colors]
		#config.theme.colors.primary.comment
		primary = ""
		#config.theme.colors.secondary.comment
		secondary = ""
		#config.theme.colors.background.comment
		background = ""
		#config.theme.colors.border.comment
		border = ""
		#config.theme.colors.text.comment
		text = ""

[animation]
	#config.animation.scanline_speed.comment
	#Range: 0.0 ~ 5.0
	scanline_speed = 1.0
	#config.animation.flicker_intensity.comment
	#Range: 0.0 ~ 1.0
	flicker_intensity = 0.15
	#config.animation.glow_intensity.comment
	#Range: 0.0 ~ 2.0
	glow_intensity = 0.5

[tooltip]
	#config.tooltip.delay.comment
	#Range: 0 ~ 5000
	delay = 500
	#config.tooltip.fade_out.comment
	#Range: 0 ~ 2000
	fade_out = 200
	#config.tooltip.animated.comment
	animated = true

[effects]
	#config.effects.holographic.comment
	holographic = true
	#config.effects.scanlines.comment
	scanlines = true
	#config.effects.glow.comment
	glow = true

[keybindings]
	#config.keybindings.open_example_ui.comment
	#Range: 0 ~ 512
	open_example_ui = 85
	#config.keybindings.open_editor.comment
	#Range: 0 ~ 512
	open_editor = 69

[features]
	#config.features.enable_pga.comment
	enable_pga = false

