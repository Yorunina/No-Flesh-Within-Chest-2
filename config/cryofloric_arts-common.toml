
["Cryofloric Arts Mod Configuration"]
	#霜尘值产生群系需要的数值
	#Range: > 1
	pollenBiomeConversionThreshold = 10000
	#感染阻隔阈值
	#Range: > 1
	infectionResistanceTriggerThreshold = 100
	#感染阻隔启用需要的霜尘值
	#Range: > 1
	infectionResistanceStartThreshold = 100000
	#凝魂碎骨强化触发后造成伤害倍率
	#Range: 0.0 ~ 1.7976931348623157E308
	soulCrushingDamageMultiplier = 2.0
	#过度生根效果造成伤害倍率
	#Range: 0.0 ~ 1.7976931348623157E308
	overRootingDamageMultiplier = 1.5
	#是否禁用生命增生效果
	disableLifeMultiplier = false
	#疮涌效果受伤产生爆炸造成的伤害倍率
	#Range: 0.0 ~ 1.7976931348623157E308
	soreRushExplosionDamageMultiplier = 0.5
	#生成带有云纹套的生物的概率（百分比）
	#Range: 0.0 ~ 100.0
	patternedMobSpawnChance = 1.0
	#云纹装备怪物生成黑名单
	#支持三种格式：
	#1. "命名空间:实体名称" - 禁用单个实体，如 "minecraft:zombie"
	#2. "#命名空间:实体标签名称" - 禁用标签中的所有实体，如 "#minecraft:skeletons"
	#3. "命名空间" - 禁用整个命名空间，如 "minecraft"
	patternedMobBlacklist = []
	#免疫疮涌效果的实体黑名单
	#支持三种格式：
	#1. "命名空间:实体名称" - 免疫单个实体，如 "minecraft:zombie"
	#2. "#命名空间:实体标签名称" - 免疫标签中的所有实体，如 "#minecraft:skeletons"
	#3. "命名空间" - 免疫整个命名空间，如 "minecraft"
	soreRushImmuneBlacklist = []
	#禁用霜粉产生过度生根效果的生物黑名单
	#支持三种格式：
	#1. "命名空间:实体名称" - 禁用单个实体，如 "minecraft:zombie"
	#2. "#命名空间:实体标签名称" - 禁用标签中的所有实体，如 "#minecraft:skeletons"
	#3. "命名空间" - 禁用整个命名空间，如 "minecraft"
	frostPowderOverRootingBlacklist = []
	#默认霜尘值配置
	#格式为："命名空间:维度注册名/霜尘值"
	#例如："minecraft:overworld/100" 表示主世界默认霜尘值为100
	#当区块没有存储霜尘值时，如果该维度在配置中有默认值，则将区块内霜尘值视作默认值，否则视作0
	defaultPollenValues = []
	#白色荒原生物群系生成白名单
	#支持三种格式：
	#1. "命名空间:实体名称" - 允许单个实体，如 "minecraft:zombie"
	#2. "#命名空间:实体标签名称" - 允许标签中的所有实体，如 "#minecraft:skeletons"
	#3. "命名空间" - 允许整个命名空间，如 "minecraft"
	#默认为 ["cryofloric_arts"]
	whiteBarrensSpawnWhitelist = ["cryofloric_arts"]

	["Cryofloric Arts Mod Configuration"."增生系统配置文件"]
		#解锁增生系统所需的花粉值阈值
		#Range: > 1
		hyperplasiaUnlockThreshold = 1000
		#触发特殊效果所需的增生值阈值
		#Range: > 1
		hyperplasiaSpecialEffectThreshold = 500
		#花粉值与增生值的倍数关系（增生值增长1点所需的花粉值倍数）
		#Range: > 1
		hyperplasiaPollenMultiplier = 100

